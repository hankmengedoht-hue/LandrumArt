name: Rebuild Gallery

on:
  push:
    branches: [main]
    paths:
      - '_data/artworks/**'
      - '_data/collections/**'
      - '_data/shop-items/**'
      - '_data/pages/**'
      - '.github/workflows/rebuild.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4

      - name: Rebuild manifests and generate static pages + sitemap
        run: |
          python3 - <<'PYEOF'
          import json, os, re, shutil
          from datetime import date

          SITE  = 'https://landrumcauthen.com'
          TODAY = date.today().isoformat()
          ARTIST = 'Capers Landrum Cauthen'

          def esc(s):
              if not s: return ''
              return (str(s)
                  .replace('&','&amp;').replace('<','&lt;')
                  .replace('>','&gt;').replace('"','&quot;'))

          def fmt_price(price):
              if price is None: return ''
              try:
                  n = float(str(price).replace('$','').replace(',',''))
                  return f'${n:,.0f}' if n == int(n) else f'${n:,.2f}'
              except: return str(price)

          # ── REBUILD MANIFESTS ──
          for d in ('_data/artworks', '_data/collections', '_data/shop-items'):
              os.makedirs(d, exist_ok=True)
              files = sorted(f for f in os.listdir(d) if f.endswith('.json') and f != 'manifest.json')
              with open(os.path.join(d, 'manifest.json'), 'w') as fh:
                  json.dump(files, fh, indent=2)
                  fh.write('\n')
              print(f'{d}/manifest.json: {len(files)} entries')

          # ── LOAD DATA ──
          def load_dir(d):
              items = []
              if not os.path.isdir(d): return items
              for f in sorted(os.listdir(d)):
                  if f.endswith('.json') and f != 'manifest.json':
                      with open(os.path.join(d, f), encoding='utf-8') as fh:
                          try:
                              item = json.load(fh)
                              item['_slug'] = f.replace('.json','')
                              items.append(item)
                          except: pass
              return items

          artworks    = load_dir('_data/artworks')
          collections = load_dir('_data/collections')
          col_map     = {c['_slug']: c.get('title','') for c in collections}

          published_artworks = [a for a in artworks if a.get('published') is not False]

          # ── SHARED HEAD/FOOTER PARTIALS ──
          def head(title, desc, og_image='', url='', canonical=''):
              h  = '<!DOCTYPE html>\n<html lang="en">\n<head>\n'
              h += '  <meta charset="UTF-8" />\n'
              h += '  <meta name="viewport" content="width=device-width, initial-scale=1.0" />\n'
              h += f'  <title>{esc(title)}</title>\n'
              if desc:
                  h += f'  <meta name="description" content="{esc(desc)}" />\n'
              h += f'  <meta property="og:type" content="website" />\n'
              h += f'  <meta property="og:title" content="{esc(title)}" />\n'
              if desc:
                  h += f'  <meta property="og:description" content="{esc(desc)}" />\n'
              if og_image:
                  h += f'  <meta property="og:image" content="{esc(og_image)}" />\n'
              if url:
                  h += f'  <meta property="og:url" content="{esc(url)}" />\n'
              h += '  <meta name="twitter:card" content="summary_large_image" />\n'
              if canonical:
                  h += f'  <link rel="canonical" href="{esc(canonical)}" />\n'
              h += '  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />\n'
              h += '  <link rel="manifest" href="/site.webmanifest" />\n'
              h += '  <link rel="preconnect" href="https://fonts.googleapis.com" />\n'
              h += '  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />\n'
              h += '  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />\n'
              h += '  <link rel="stylesheet" href="/style.css" />\n'
              h += '</head>\n'
              return h

          def nav(active=''):
              links = [
                  ('/gallery.html','gallery','Gallery'),
                  ('/collections.html','collections','Collections'),
                  ('/about.html','about','About'),
                  ('/contact.html','contact','Contact'),
              ]
              items = ''.join(
                  f'<a href="{url}" class="nav-link{" active" if k==active else ""}">{label}</a>'
                  for url,k,label in links[:-1]
              )
              cta = f'<a href="/contact.html" class="nav-link{" active" if active=="contact" else ""} nav-link-cta">Contact</a>'
              return f'''
          <header class="site-header scrolled" id="site-header">
            <div class="container nav-inner">
              <a href="/index.html" class="logo">
                <span class="logo-name">{ARTIST}</span>
                <span class="logo-sub">Fine Art</span>
              </a>
              <nav class="main-nav" id="main-nav" aria-label="Main navigation">
                {items}{cta}
              </nav>
              <button class="hamburger" id="hamburger" aria-label="Open menu">
                <span></span><span></span><span></span>
              </button>
            </div>
          </header>'''

          def footer():
              return f'''
          <footer class="site-footer">
            <div class="container footer-inner">
              <div class="footer-brand">
                <a href="/index.html" class="logo">
                  <span class="logo-name">{ARTIST}</span>
                  <span class="logo-sub">Fine Art</span>
                </a>
                <p class="footer-tagline" data-cms="tagline">Original paintings and fine art prints.</p>
              </div>
              <div class="footer-col"><h5>Gallery</h5>
                <a href="/gallery.html">All Artworks</a>
                <a href="/collections.html">Collections</a>
              </div>
              <div class="footer-col"><h5>Artist</h5>
                <a href="/about.html">About</a>
                <a href="/contact.html">Contact</a>
              </div>
              <div class="footer-col"><h5>Connect</h5>
                <a href="#" data-cms="instagram">Instagram</a>
                <a href="#" data-cms="facebook">Facebook</a>
              </div>
            </div>
            <div class="footer-bottom container">
              <p>&copy; {date.today().year} {ARTIST}. All rights reserved.</p>
            </div>
          </footer>'''

          LIGHTBOX = '''
          <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Image lightbox">
            <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close">&times;</button>
            <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)" aria-label="Previous">&#8249;</button>
            <img class="lightbox-img" id="lightbox-img" src="" alt="" />
            <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)" aria-label="Next">&#8250;</button>
          </div>'''

          # ── GENERATE ARTWORK PAGES ──
          shutil.rmtree('artwork', ignore_errors=True)
          os.makedirs('artwork', exist_ok=True)

          generated_artworks = []

          for a in published_artworks:
              slug        = a['_slug']
              title       = a.get('title','')
              desc        = a.get('description','')
              medium      = a.get('medium','')
              dimensions  = a.get('dimensions','')
              year        = a.get('year','')
              col_slug    = a.get('collection','')
              col_title   = col_map.get(col_slug,'')
              opts        = a.get('purchase_options') or []

              img = a.get('image','')
              if not img and a.get('gallery_images'):
                  img = a['gallery_images'][0] if isinstance(a['gallery_images'][0],str) else a['gallery_images'][0].get('image','')

              all_imgs = [a.get('image','')] + [
                  x if isinstance(x,str) else x.get('image','')
                  for x in (a.get('gallery_images') or [])
              ]
              unique_imgs = list(dict.fromkeys(i for i in all_imgs if i))

              page_url = f'{SITE}/artwork/{slug}.html'
              og_image = SITE + img if img else ''

              # Schema.org VisualArtwork
              schema = {
                  '@context': 'https://schema.org',
                  '@type': 'VisualArtwork',
                  'name': title,
                  'description': desc,
                  'creator': {'@type': 'Person', 'name': ARTIST},
                  'url': page_url
              }
              if medium:      schema['artMedium'] = medium
              if dimensions:  schema['size'] = dimensions
              if year:        schema['dateCreated'] = str(year)
              if og_image:    schema['image'] = og_image
              if col_title:   schema['artworkSurface'] = col_title

              avail_opts = [o for o in opts if o.get('available') is not False]
              if avail_opts:
                  prices = [float(str(o.get('price',0)).replace('$','').replace(',',''))
                            for o in avail_opts if o.get('price')]
                  if prices:
                      schema['offers'] = {
                          '@type': 'AggregateOffer',
                          'priceCurrency': 'USD',
                          'lowPrice': min(prices),
                          'highPrice': max(prices),
                          'availability': 'https://schema.org/InStock'
                      }

              # Build image gallery HTML
              thumb_html = ''
              if len(unique_imgs) > 1:
                  thumbs = ''.join(
                      f'<div class="detail-thumb{"  active" if i==0 else ""}" tabindex="0" '
                      f'onclick="setThumb({i})" onkeydown="if(event.key===\'Enter\')setThumb({i})">'
                      f'<img src="{esc(im)}" alt="{esc(title)} view {i+1}" loading="lazy" /></div>'
                      for i, im in enumerate(unique_imgs)
                  )
                  thumb_html = f'<div class="detail-thumbs" id="detail-thumbs">{thumbs}</div>'

              # Purchase options HTML
              opts_html = ''
              if opts:
                  opts_html = '<div class="purchase-options-title">Available As</div>'
                  for o in opts:
                      avail    = o.get('available') is not False
                      price_s  = fmt_price(o.get('price')) if o.get('price') else ''
                      btn_html = ''
                      if avail and o.get('shopify_url'):
                          purchase_label = f'Purchase{" — " + price_s if price_s else ""}'
                          btn_html = f'<a href="{esc(o["shopify_url"])}" target="_blank" rel="noopener noreferrer" class="btn-shopify">{esc(purchase_label)}</a>'
                      elif not avail:
                          btn_html = '<button class="btn-sold" disabled>Sold</button>'
                      avail_cls   = 'availability-available' if avail else 'availability-sold'
                      avail_label = 'Available' if avail else 'Sold'
                      desc_html   = f'<p class="purchase-option-desc">{esc(o.get("description",""))}</p>' if o.get("description") else ''
                      price_html  = f'<div class="purchase-option-price">{esc(price_s)}</div>' if price_s else ''
                      opts_html += f'''
                  <div class="purchase-option">
                    <div class="purchase-option-header">
                      <div class="purchase-option-type">{esc(o.get("type",""))}</div>
                      {price_html}
                    </div>
                    {desc_html}
                    <div class="availability-badge {avail_cls}">{avail_label}</div>
                    {btn_html}
                  </div>'''
              else:
                  opts_html = '<p class="detail-contact-note">Contact for pricing and availability — <a href="/contact.html">get in touch</a>.</p>'

              # Specs
              specs_data = [('Medium',desc) for desc in [medium] if medium] + \
                           [('Dimensions',dimensions) if dimensions else ()] + \
                           [('Year',str(year)) if year else ()] + \
                           [('Collection',col_title) if col_title else ()]
              specs_data = [(l,v) for (l,v) in specs_data if v]
              specs_html = ''.join(
                  f'<div class="detail-spec"><div class="detail-spec-label">{esc(l)}</div>'
                  f'<div class="detail-spec-value">{esc(v)}</div></div>'
                  for l, v in specs_data
              )

              # setThumb JS
              imgs_js = json.dumps(unique_imgs)
              set_thumb_js = f'''
          <script>
            var _imgs = {imgs_js};
            function setThumb(i) {{
              var img = document.getElementById('detail-main-img');
              if (img) {{ img.src = _imgs[i]; img.alt = {json.dumps(title)}; }}
              document.querySelectorAll('.detail-thumb').forEach(function(t,idx){{
                t.classList.toggle('active', idx === i);
              }});
              window._currentIdx = i;
            }}
            window._currentIdx = 0;
            window._imgs = _imgs;
            document.addEventListener('DOMContentLoaded', function() {{
              var mw = document.getElementById('detail-main-image');
              if (mw) mw.addEventListener('click', function() {{
                openLightbox(_imgs, window._currentIdx);
              }});
            }});
          </script>'''

              h  = head(f'{title} — {ARTIST}', desc, og_image, page_url, page_url)
              h += f'  <script type="application/ld+json">\n{json.dumps(schema, indent=2)}\n  </script>\n'
              h += '</head>\n'
              h += f'<body data-page="artwork" data-slug="{esc(slug)}">\n'
              h += '<a class="skip-to-content" href="#main-content">Skip to main content</a>\n'
              h += nav('gallery')
              h += '\n<main id="main-content">\n'
              h += '\n<div class="artwork-detail"><div class="container">\n'
              h += f'''<nav class="detail-breadcrumb" aria-label="Breadcrumb">
                <a href="/gallery.html">Gallery</a>
                <span class="detail-breadcrumb-sep">›</span>
                {'<a href="/collection/' + esc(col_slug) + '.html">' + esc(col_title) + '</a><span class="detail-breadcrumb-sep">›</span>' if col_title else ''}
                <span>{esc(title)}</span>
              </nav>'''
              h += '\n<div class="detail-layout">\n'
              h += f'''
              <div class="detail-gallery-col">
                <div class="detail-main-image" id="detail-main-image" title="Click to enlarge">
                  <img src="{esc(unique_imgs[0] if unique_imgs else "")}" alt="{esc(title)}" id="detail-main-img" />
                </div>
                {thumb_html}
              </div>'''
              col_html = f'<a href="/collection/{esc(col_slug)}.html">{esc(col_title)}</a>' if col_title else ''
              h += f'''
              <div class="detail-info">
                {'<div class="detail-collection">' + col_html + '</div>' if col_html else ''}
                <h1 class="detail-title">{esc(title)}</h1>
                <div class="detail-specs">{specs_html}</div>
                {'<p class="detail-description">' + esc(desc) + '</p>' if desc else ''}
                <div class="purchase-options">{opts_html}</div>
                <p class="detail-contact-note">Questions? <a href="/contact.html">Get in touch</a>.</p>
              </div>'''
              h += '\n</div></div></div>\n'
              h += '''
          <section class="cta-banner">
            <div class="container">
              <span class="section-eyebrow">Commission</span>
              <h2>Interested in a Similar Work?</h2>
              <p class="lead">Commission an original painting tailored to your vision and space.</p>
              <div class="cta-actions">
                <a href="/contact.html" class="btn btn-accent">Inquire</a>
                <a href="/gallery.html" class="btn btn-ghost">Back to Gallery</a>
              </div>
            </div>
          </section>'''
              h += '\n</main>\n'
              h += footer()
              h += LIGHTBOX
              h += set_thumb_js
              h += '\n<script src="/main.js"></script>\n</body>\n</html>\n'

              with open(f'artwork/{slug}.html', 'w', encoding='utf-8') as fh:
                  fh.write(h)
              generated_artworks.append(slug)
              print(f'Generated: artwork/{slug}.html')

          # ── GENERATE COLLECTION PAGES ──
          shutil.rmtree('collection', ignore_errors=True)
          os.makedirs('collection', exist_ok=True)

          generated_collections = []

          for c in collections:
              if c.get('published') is False: continue
              slug  = c['_slug']
              title = c.get('title','')
              desc  = c.get('description','')
              img   = c.get('banner_image','')

              works = [a for a in published_artworks if a.get('collection') == slug]
              works.sort(key=lambda a: (a.get('order',99), a.get('title','')))

              def artwork_card(a):
                  aimg = a.get('image','') or (a.get('gallery_images') or [''])[0]
                  if isinstance(aimg, dict): aimg = aimg.get('image','')
                  opts = a.get('purchase_options') or []
                  sold = opts and all(o.get('available') is False for o in opts)
                  prices = [float(str(o.get('price',0)).replace('$','').replace(',',''))
                            for o in opts if o.get('available') is not False and o.get('price')]
                  mp = min(prices) if prices else None
                  badge = '<span class="card-badge badge-featured">Featured</span>' if a.get('featured') else ''
                  if sold: badge += '<span class="card-badge badge-sold">Sold</span>'
                  img_html = f'<img src="{esc(aimg)}" alt="{esc(a.get("title",""))}" loading="lazy" />' if aimg else '<div class="card-image-placeholder">🖼</div>'
                  price_html = f'<div class="card-price">{"Sold" if sold else "From " + fmt_price(mp) if mp else ""}</div>' if sold or mp else ''
                  return f'''
              <article class="artwork-card{"  featured" if a.get("featured") else ""}" role="link" tabindex="0"
                onclick="window.location='/artwork/{esc(a["_slug"])}.html'"
                onkeydown="if(event.key===\'Enter\')window.location='/artwork/{esc(a["_slug"])}.html'">
                <div class="card-image-wrap">{img_html}{badge}</div>
                <div class="card-info">
                  <div class="card-title">{esc(a.get("title",""))}</div>
                  <div class="card-meta">{esc((" · ".join([x for x in [a.get("medium",""), str(a.get("year",""))] if x]))[:50])}</div>
                  {price_html}
                </div>
              </article>'''

              page_url = f'{SITE}/collection/{slug}.html'
              og_image = SITE + img if img else ''

              hero_html = ''
              if img:
                  hero_html = f'''
          <div class="collection-hero">
            <img src="{esc(img)}" alt="{esc(title)}" />
            <div class="collection-hero-content">
              <nav aria-label="Breadcrumb" style="margin-bottom:.75rem">
                <a href="/collections.html" style="font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(240,235,227,.5);font-weight:600">← Collections</a>
              </nav>
              <h1>{esc(title)}</h1>
              <div class="collection-hero-meta">{len(works)} work{"s" if len(works)!=1 else ""}</div>
            </div>
          </div>'''
              else:
                  hero_html = f'''
          <div style="padding-top:calc(var(--nav-h) + 3rem);padding-bottom:2.5rem;border-bottom:1px solid var(--border)">
            <div class="container">
              <a href="/collections.html" style="font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;display:inline-block;margin-bottom:1.5rem">← Collections</a>
              <span class="section-eyebrow">Collection</span>
              <h1 style="font-style:italic;font-weight:300">{esc(title)}</h1>
              <div style="font-size:.72rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-top:.5rem">{len(works)} work{"s" if len(works)!=1 else ""}</div>
            </div>
          </div>'''

              schema = {
                  '@context': 'https://schema.org',
                  '@type': 'CollectionPage',
                  'name': f'{title} — {ARTIST}',
                  'description': desc,
                  'url': page_url
              }

              h  = head(f'{title} — {ARTIST}', desc or f'Artworks from the {title} collection by {ARTIST}.', og_image, page_url, page_url)
              h += f'  <script type="application/ld+json">\n{json.dumps(schema, indent=2)}\n  </script>\n</head>\n'
              h += f'<body data-page="collection" data-slug="{esc(slug)}">\n'
              h += '<a class="skip-to-content" href="#main-content">Skip to main content</a>\n'
              h += nav('collections')
              h += '\n<main id="main-content">\n'
              h += hero_html
              h += '\n<section class="section" style="padding-top:2.5rem"><div class="container">\n'
              if desc:
                  h += f'<p class="detail-description" style="margin-bottom:2.5rem;max-width:65ch">{esc(desc)}</p>\n'
              if works:
                  h += f'<div class="artwork-grid artwork-grid-md">{"".join(artwork_card(a) for a in works)}</div>\n'
              else:
                  h += '<p style="color:var(--muted);text-align:center;padding:4rem 0">No artworks in this collection yet.</p>\n'
              h += '</div></section>\n'
              h += '''
          <section class="cta-banner fade-in">
            <div class="container">
              <h2>Explore More Collections</h2>
              <div class="cta-actions">
                <a href="/collections.html" class="btn btn-accent">All Collections</a>
                <a href="/gallery.html"     class="btn btn-ghost">Full Gallery</a>
              </div>
            </div>
          </section>'''
              h += '\n</main>\n'
              h += footer()
              h += '\n<script src="/main.js"></script>\n</body>\n</html>\n'

              with open(f'collection/{slug}.html', 'w', encoding='utf-8') as fh:
                  fh.write(h)
              generated_collections.append(slug)
              print(f'Generated: collection/{slug}.html')

          # ── GENERATE SITEMAP ──
          core = [
              ('', '1.0', 'weekly'),
              ('gallery.html', '0.9', 'weekly'),
              ('collections.html', '0.8', 'monthly'),
              ('about.html', '0.7', 'monthly'),
              ('contact.html', '0.7', 'monthly'),
          ]

          sm  = '<?xml version="1.0" encoding="UTF-8"?>\n'
          sm += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'
          for path, pri, freq in core:
              sm += f'  <url><loc>{SITE}/{path}</loc>'
              sm += f'<lastmod>{TODAY}</lastmod>'
              sm += f'<changefreq>{freq}</changefreq>'
              sm += f'<priority>{pri}</priority></url>\n'
          for slug in sorted(generated_artworks):
              sm += f'  <url><loc>{SITE}/artwork/{slug}.html</loc>'
              sm += f'<lastmod>{TODAY}</lastmod><changefreq>monthly</changefreq><priority>0.8</priority></url>\n'
          for slug in sorted(generated_collections):
              sm += f'  <url><loc>{SITE}/collection/{slug}.html</loc>'
              sm += f'<lastmod>{TODAY}</lastmod><changefreq>monthly</changefreq><priority>0.7</priority></url>\n'
          sm += '</urlset>\n'

          with open('sitemap.xml', 'w', encoding='utf-8') as fh:
              fh.write(sm)
          print(f'Generated sitemap.xml: {len(core) + len(generated_artworks) + len(generated_collections)} URLs')
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --no-rebase || true
          git add \
            _data/artworks/manifest.json \
            _data/collections/manifest.json \
            _data/shop-items/manifest.json \
            artwork/ \
            collection/ \
            sitemap.xml
          if git diff --staged --quiet; then
            echo "Everything already up to date."
          else
            git commit -m "Auto-rebuild artwork pages and sitemap [skip ci]"
            git push
          fi
